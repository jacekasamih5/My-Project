<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENG/Jaceka Samih | Contact Me</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-200 gold-gradient-bg min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-neutral-900">
        <div class="max-w-7xl px-6 py-4 mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 font-black text-xl tracking-wider text-amber-400">
                <img src="image/LOGO.png" alt="JS Logo" class="h-10 w-10 rounded-lg object-cover border border-amber-500/30 shadow-lg shadow-amber-500/10 mix-blend-screen">
                <span>JS PORTFOLIO</span>
            </a>
            
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-neutral-400">
                <a href="index.html" class="hover:text-amber-400 transition-colors flex items-center gap-1.5"><i data-lucide="terminal" class="w-4 h-4"></i> <span data-i18n="navHome">الرئيسية</span></a>
                <a href="about.html" class="hover:text-amber-400 transition-colors flex items-center gap-1.5"><i data-lucide="cpu" class="w-4 h-4"></i> <span data-i18n="navAbout">من أنا</span></a>
                <a href="projects.html" class="hover:text-amber-400 transition-colors flex items-center gap-1.5"><i data-lucide="code-2" class="w-4 h-4"></i> <span data-i18n="navProjects">أعمالي</span></a>
                <a href="contact.html" class="text-amber-400 flex items-center gap-1.5"><i data-lucide="phone" class="w-4 h-4"></i> <span data-i18n="navContact">اتصلي بي</span></a>
            </nav>

            <div class="hidden md:flex items-center gap-4">
                <div class="relative inline-block text-right group">
                    <button class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-neutral-300 bg-neutral-900 border border-neutral-800 rounded-lg hover:border-amber-500/40 transition-colors">
                        <i data-lucide="languages" class="w-4 h-4 text-amber-400"></i>
                        <span id="current-lang-text">العربية</span>
                        <i data-lucide="chevron-down" class="w-3 h-3"></i>
                    </button>
                    <div class="absolute left-0 mt-2 w-40 origin-top-left bg-neutral-950 border border-neutral-800 rounded-xl shadow-2xl invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-all duration-200 z-50">
                        <div class="py-1 text-xs text-neutral-400 text-left px-2 space-y-1 max-h-60 overflow-y-auto no-scrollbar">
                            <button onclick="changeLanguage('ar')" class="w-full text-right block px-3 py-2 rounded-lg hover:bg-neutral-900 hover:text-amber-400 transition-colors">العربية (AR)</button>
                            <button onclick="changeLanguage('en')" class="w-full text-left block px-3 py-2 rounded-lg hover:bg-neutral-900 hover:text-amber-400 transition-colors">English (EN)</button>
                            <button onclick="changeLanguage('es')" class="w-full text-left block px-3 py-2 rounded-lg hover:bg-neutral-900 hover:text-amber-400 transition-colors">Español (ES)</button>
                            <button onclick="changeLanguage('de')" class="w-full text-left block px-3 py-2 rounded-lg hover:bg-neutral-900 hover:text-amber-400 transition-colors">Deutsch (DE)</button>
                            <button onclick="changeLanguage('tr')" class="w-full text-left block px-3 py-2 rounded-lg hover:bg-neutral-900 hover:text-amber-400 transition-colors">Türkçe (TR)</button>
                            <button onclick="changeLanguage('it')" class="w-full text-left block px-3 py-2 rounded-lg hover:bg-neutral-900 hover:text-amber-400 transition-colors">Italiano (IT)</button>
                        </div>
                    </div>
                </div>
                <a href="contact.html" class="px-4 py-2 text-xs font-medium text-black bg-gradient-to-r from-amber-500 to-yellow-400 rounded-lg font-bold" data-i18n="btnDirect">تواصل فوري</a>
            </div>

            <button id="menu-btn" class="md:hidden text-neutral-400 hover:text-amber-400"><i data-lucide="menu" class="w-6 h-6"></i></button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-neutral-950 border-b border-neutral-900 px-6 py-4 space-y-4">
            <a href="index.html" class="block text-neutral-300 hover:text-amber-400 py-1" data-i18n="navHome">الرئيسية</a>
            <a href="about.html" class="block text-neutral-300 hover:text-amber-400 py-1" data-i18n="navAbout">من أنا</a>
            <a href="projects.html" class="block text-neutral-300 hover:text-amber-400 py-1" data-i18n="navProjects">أعمالي</a>
            <a href="contact.html" class="block text-amber-400 py-1" data-i18n="navContact">اتصلي بي</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-6 pt-32 pb-16">
        <section id="contact" class="max-w-3xl mx-auto w-full">
            <div class="bg-neutral-950 border border-neutral-900 rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/5 rounded-full blur-3xl"></div>
                
                <div class="text-center space-y-1 mb-4">
                    <h2 class="text-2xl md:text-3xl font-bold text-white" data-i18n="contactHeading">ابدأ مشروعك معي</h2>
                    <p id="contact-sub" class="text-neutral-500 text-xs">يسعدني دائماً تواصلك لمناقشة الأفكار الهندسية المبتكرة.</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4 text-center">
                    <div class="bg-neutral-900/50 border border-neutral-800/60 rounded-xl p-2.5 flex flex-col items-center gap-0.5">
                        <i data-lucide="phone" class="w-3.5 h-3.5 text-amber-400"></i>
                        <span class="text-[9px] text-neutral-500 tracking-wider" data-i18n="cPhone">رقم الهاتف</span>
                        <a href="tel:+201201428714" class="text-xs text-neutral-300 hover:text-amber-400 font-mono tracking-wide dir-ltr">+20 120 142 8714</a>
                    </div>
                    <div class="bg-neutral-900/50 border border-neutral-800/60 rounded-xl p-2.5 flex flex-col items-center gap-0.5">
                        <i data-lucide="mail" class="w-3.5 h-3.5 text-amber-400"></i>
                        <span class="text-[9px] text-neutral-500 tracking-wider" data-i18n="cEmail">البريد الإلكتروني</span>
                        <a href="mailto:jacekasamih5@gmail.com" class="text-xs text-neutral-300 hover:text-amber-400 font-mono tracking-wide dir-ltr">jacekasamih5@gmail.com</a>
                    </div>
                </div>

                <form class="space-y-3" onsubmit="event.preventDefault(); alert('Sent Successfully!');">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-neutral-400" data-i18n="formName">الاسم</label>
                            <input type="text" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-2 text-xs text-neutral-200 focus:outline-none focus:border-amber-500 transition-colors" id="input-name" placeholder="الاسم الكريم">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-medium text-neutral-400" data-i18n="formEmail">البريد الإلكتروني</label>
                            <input type="email" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-2 text-xs text-neutral-200 focus:outline-none focus:border-amber-500 transition-colors" placeholder="name@example.com">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-medium text-neutral-400" data-i18n="formMsg">تفاصيل الرسالة</label>
                        <textarea rows="2" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-2 text-xs text-neutral-200 focus:outline-none focus:border-amber-500 transition-colors" id="input-msg" placeholder="اكتبِ هنا تفاصيل المشروع..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-2.5 font-medium text-black bg-gradient-to-r from-amber-500 to-yellow-500 rounded-xl font-bold text-xs" data-i18n="btnSubmit">
                        إرسال الرسالة الرقمية
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="w-full border-t border-neutral-900 bg-black/40 py-4 text-center text-[10px] text-neutral-600">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 px-4">
            <p id="footer-text">&copy; 2026 ENG/Jaceka Samih. جميع الحقوق محفوظة.</p>
            <span class="text-neutral-700">Code with Passion</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
